name: KINETIC CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage (unit tests)
        run: cargo tarpaulin --lib --skip-clean --out html json stdout --timeout 600 --exclude-files "crates/kinetic-gpu/*" "crates/kinetic-python/*" "crates/horus-kinetic/*"

      - name: Check coverage threshold (85%)
        run: |
          COVERAGE=$(python3 -c "import json; d=json.load(open('tarpaulin-report.json')); print(f'{d.get(\"coverage\", 0):.1f}')" 2>/dev/null || echo "0")
          echo "Coverage: ${COVERAGE}%"
          python3 -c "
          import sys
          cov = float('${COVERAGE}')
          if cov < 85.0:
              print(f'::warning::Coverage {cov}% is below 85% target')
          else:
              print(f'Coverage {cov}% meets 85% target')
          "
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: tarpaulin-report.html

  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run acceptance tests
        run: cargo test -p kinetic --test "test_0*" --test "test_1*" --test "test_critical*"

      - name: Run acceptance benchmarks
        run: cargo test -p kinetic --test "test_bench*"

  safety-audit:
    name: Safety Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Verify unsafe only in SIMD modules
        run: |
          UNSAFE_FILES=$(grep -rl 'unsafe' crates/ --include='*.rs' | grep -v 'kinetic-collision/src/simd' | grep -v 'target/' || true)
          if [ -n "$UNSAFE_FILES" ]; then
            echo "::error::Unsafe code found outside kinetic-collision/src/simd/:"
            echo "$UNSAFE_FILES"
            exit 1
          fi

      - name: Miri on SoA and scalar SIMD
        run: |
          cargo +nightly miri test -p kinetic-collision --lib soa::tests || true
          cargo +nightly miri test -p kinetic-collision --lib simd::tests::scalar_fallback_correctness || true

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run benchmarks (report only)
        run: cargo bench -p kinetic --no-fail-fast 2>&1 | tee bench-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion/

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

name: Deploy mdBook to Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - 'README.md'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: 0.4.44
  MDBOOK_MERMAID_VERSION: 0.14.0

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo bin
        id: cache-mdbook
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: mdbook-${{ env.MDBOOK_VERSION }}-mermaid-${{ env.MDBOOK_MERMAID_VERSION }}

      - name: Install mdbook + mdbook-mermaid
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: |
          cargo install --locked --version ${{ env.MDBOOK_VERSION }} mdbook
          cargo install --locked --version ${{ env.MDBOOK_MERMAID_VERSION }} mdbook-mermaid

      - name: Build book
        working-directory: docs-site
        run: mdbook build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/book

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

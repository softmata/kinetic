[planning_group.arm]
chain = ["base_link", "end_effector_link"]

[end_effector.tool]
parent_link = "end_effector_link"
parent_group = "arm"
tcp_xyz = [0.0, 0.0, 0.0]

[ik]
solver = "dls"

[robot]
name = "baxter_left"
urdf = "baxter_left.urdf"
dof = 7

[planning_group.arm]
chain = ["base_link", "left_gripper_link"]

[end_effector.left_gripper]
parent_link = "left_gripper_link"
parent_group = "arm"
tcp_xyz = [0.0, 0.0, 0.0]

[ik]
solver = "dls"
